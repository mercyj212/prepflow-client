<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrepDrive</title>
  <style>
    #exit-game-btn {
      position: fixed; top: 16px; right: 16px;
      z-index: 9999; background: rgba(0,0,0,0.85);
      border: 2px solid rgba(255,255,255,0.4); color: #fff;
      font-family: 'Courier New', monospace; font-weight: 900;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      padding: 10px 18px; cursor: pointer; transition: all 0.15s;
    }
    #exit-game-btn:hover { background: #fff; color: #000; }
  </style>
  <style>
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body, #root { 
      width: 100%; height: 100%; overflow: hidden; background: #000; 
      font-family: 'Inter', system-ui, sans-serif; 
    }
    canvas { display: block; outline: none !important; }
    
    /* Tactical Brutalist HUD */
    #hud-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
      color: white;
      text-transform: uppercase;
    }

    .brutalist-panel {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #fff;
      padding: 10px 15px;
      pointer-events: auto;
      box-shadow: 4px 4px 0px rgba(108, 99, 255, 0.5);
    }

    /* Top Left: Score & Progress */
    .top-left-hud {
      position: absolute; top: 20px; left: 20px;
      min-width: 200px;
    }
    .score-label { font-size: 9px; font-weight: 800; color: #6C63FF; letter-spacing: 3px; margin-bottom: 2px; }
    .score-value { font-size: 32px; font-weight: 900; color: #fff; line-height: 1; font-family: 'Courier New', monospace; }
    .progress-container { margin-top: 12px; width: 100%; height: 4px; background: rgba(255,255,255,0.1); }
    #progress-bar { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }

    /* Top Center: Checkpoint */
    .top-center-hud {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      text-align: center;
      background: #fff; color: #000;
      padding: 5px 20px;
      border: 2px solid #000;
      box-shadow: 4px 4px 0px #6C63FF;
    }
    .cp-label { font-size: 24px; font-weight: 900; letter-spacing: 2px; font-family: 'Courier New', monospace; }
    .cp-subtext { font-size: 9px; font-weight: 900; letter-spacing: 2px; }

    /* Top Right: Time & Lives */
    .top-right-hud {
      position: absolute; top: 20px; right: 20px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .time-value { font-size: 22px; font-weight: 900; font-family: 'Courier New', monospace; color: #fff; }
    .lives-container { display: flex; gap: 4px; }
    .heart { width: 14px; height: 14px; background: #fff; border: 1px solid #000; }
    .heart.lost { background: transparent; border-color: rgba(255,255,255,0.3); }

    /* Speedometer (Center Bottom) */
    .bottom-center-hud {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: flex-end; gap: 5px;
      padding: 10px 20px;
      background: #000; border: 2px solid #fff;
    }
    #speedo-value { font-size: 96px; font-weight: 900; line-height: 0.8; letter-spacing: -4px; font-family: 'Courier New', monospace; color: #fff; }
    .speedo-unit { font-size: 18px; font-weight: 900; color: #6C63FF; margin-bottom: 15px; }

    /* Control Buttons (Bottom Sides) */
    .controls-container {
      position: absolute; bottom: 30px; width: 100%;
      display: flex; justify-content: space-between; padding: 0 30px;
      pointer-events: none;
    }
    .ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
    .btn-square {
      width: 65px; height: 65px;
      background: rgba(0,0,0,0.8); border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; cursor: pointer;
      color: #fff; font-weight: 900; font-size: 20px;
    }
    .btn-square:active { background: #fff; color: #000; transform: translate(2px, 2px); }

    .pedal {
      width: 60px; height: 100px; background: rgba(0,0,0,0.8);
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: #fff;
      transition: all 0.1s; cursor: pointer;
    }
    .pedal.active, .pedal:active { background: #fff; color: #000; transform: translateY(4px); }
    .pedal-accel { height: 130px; border-width: 3px; }

    /* NOTIFICATIONS */
    .checkpoint-notify {
        position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
        background: #fff; color: #000; padding: 20px 40px;
        font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;
        border: 4px solid #6C63FF; z-index: 150;
        animation: slide-in 0.3s forwards, fade-out 0.3s 1.7s forwards;
    }
    @keyframes slide-in { from { top: -100px; } to { top: 100px; } }
    @keyframes fade-out { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    }

    /* OVERLAYS */
    #start-overlay, #game-over-overlay {
        position: fixed; inset: 0; background: #000; z-index: 200;
        display: flex; align-items: center; justify-content: center;
    }
    #game-over-overlay { background: rgba(255,0,0,0.15); backdrop-filter: blur(10px); }
    
    #start-btn:hover {
        background: #00d4ff !important;
        color: #000 !important;
        box-shadow: 0 0 40px rgba(0,212,255,0.5);
    }
  </style>
</head>
<body>
  <button id="exit-game-btn" onclick="window.parent.postMessage('EXIT_PREPDRIVE', '*')">✕ Exit</button>
  <div id="root"></div>
  <div id="hud-overlay">
    <!-- Top Left -->
    <div class="top-left-hud brutalist-panel">
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
          <div>
              <div class="score-label">DATA MASTERY</div>
              <div class="score-value" id="stat-score">000,000</div>
          </div>
          <div style="text-align: right;">
              <div class="score-label">LEVEL</div>
              <div class="score-value" id="stat-level" style="color: #6C63FF;">1</div>
          </div>
      </div>
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <!-- Top Center -->
    <div class="top-center-hud">
      <div class="cp-label">UNIT: <span id="stat-unit-current">0</span> / <span id="stat-unit-total">10</span></div>
      <div class="cp-subtext">LEVEL MISSION PROGRESS</div>
    </div>

    <!-- Top Right -->
    <div class="top-right-hud brutalist-panel">
      <div class="time-value" id="stat-time">00:00:00</div>
      <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
          <div class="score-label" style="margin: 0; font-size: 7px;">MASTERY BADGES</div>
          <div id="mastery-badges" style="display: flex; gap: 4px;">
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
          </div>
      </div>
      <div class="lives-container">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
      </div>
    </div>

    <!-- Center Bottom Speedo -->
    <div class="bottom-center-hud">
      <div id="speedo-value">0</div>
      <div class="speedo-unit" id="stat-gear">N</div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-container">
      <!-- Joystick Steering (replaces L/R buttons) -->
      <div id="steering-zone" style="
        width: 140px; height: 140px;
        position: relative;
        touch-action: none;
      ">
        <!-- Outer ring -->
        <div style="
          width: 140px; height: 140px;
          border-radius: 50%;
          background: rgba(0,0,0,0.7);
          border: 2px solid rgba(255,255,255,0.4);
          position: absolute; top: 0; left: 0;
        "></div>
        <!-- Steering wheel icon -->
        <div id="steering-wheel-icon" style="
          width: 140px; height: 140px;
          position: absolute; top: 0; left: 0;
          display: flex; align-items: center; justify-content: center;
          transition: transform 0.1s;
        ">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="6" />
            <circle cx="50" cy="50" r="10" fill="rgba(255,255,255,0.4)" />
            <rect x="10" y="47" width="80" height="6" fill="rgba(255,255,255,0.4)" />
            <rect x="47" y="50" width="6" height="40" fill="rgba(255,255,255,0.4)" />
          </svg>
        </div>
        <!-- Knob -->
        <div id="joystick-knob" style="
          width: 52px; height: 52px;
          border-radius: 50%;
          background: rgba(255,255,255,0.9);
          border: 2px solid #fff;
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          transition: box-shadow 0.1s;
          box-shadow: 0 0 0 4px rgba(108,99,255,0.4);
        "></div>
      </div>

      <div class="ctrl-group" style="align-items: flex-end; gap: 10px;">
        <div id="nitro-btn" class="btn-square" style="border-color: #6C63FF; font-size: 10px; height: 60px; width: 60px;">BOOST</div>
        <div id="pedal-brake" class="pedal">BRAKE</div>
        <div id="pedal-accel" class="pedal pedal-accel">DRIVE</div>
      </div>
    </div>
  </div>

  <!-- START / LOADING OVERLAY -->
  <div id="start-overlay">
      <div class="brutalist-panel" style="padding: 3rem; text-align: center; max-width: 500px; border-width: 4px;">
          <h1 style="margin: 0; font-size: 3rem; letter-spacing: 8px; color: #fff;">PREPUP_DRIVE</h1>
          <div style="height: 2px; background: #6C63FF; margin: 1.5rem 0;"></div>
          <p id="loading-status" style="margin: 1rem 0; font-size: 0.8rem; color: #888; letter-spacing: 4px; font-family: monospace;">INITIALIZING_CORE_SYSTEMS...</p>
          <button id="start-btn" style="display: none; width: 100%; border: 3px solid #fff; background: #fff; color: #000; padding: 1.2rem; cursor: pointer; font-family: inherit; font-weight: 900; letter-spacing: 5px; transition: 0.2s;">EXECUTE_DRIVE</button>
      </div>
  </div>

  <!-- CRASH OVERLAY -->
  <div id="crash-overlay" style="display: none; position: fixed; inset: 0; background: rgba(255,0,0,0.4); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; flex-direction: column; border: 10px solid #ff0033;">
      <h1 style="color: #fff; font-size: 4rem; font-weight: 900; letter-spacing: 15px; margin: 0; background: #ff0033; padding: 10px 40px;">CRASH</h1>
      <p style="color: #fff; letter-spacing: 5px; font-weight: 900; font-size: 14px; margin-top: 20px; text-shadow: 2px 2px 0px #000;">SYSTEM_REBOOTING...</p>
  </div>

  <script type="module" src="/prepdrive.js"></script>
</body>
</html>
