<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrepUp Drive - High Fidelity</title>
  <style>
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body, #root { 
      width: 100%; height: 100%; overflow: hidden; background: #000; 
      font-family: 'Inter', system-ui, sans-serif; 
      touch-action: none;
      overscroll-behavior: none;
    }
    canvas { display: block; outline: none !important; }
    
    /* Tactical Brutalist HUD */
    #hud-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 100;
      color: white;
      text-transform: uppercase;
    }

    .brutalist-panel {
      background: rgba(24, 24, 27, 0.95); /* zinc-900 */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 15px 20px;
      pointer-events: auto;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    /* Top Left: Score & Progress */
    .top-left-hud {
      position: absolute; top: 20px; left: 20px;
      min-width: 200px;
    }
    .score-label { font-size: 10px; font-weight: 600; color: #a1a1aa; letter-spacing: 2px; margin-bottom: 2px; text-transform: uppercase; }
    .score-value { font-size: 28px; font-weight: 600; color: #f4f4f5; line-height: 1; font-family: 'Inter', sans-serif; letter-spacing: -1px; }
    .progress-container { margin-top: 12px; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 9999px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #10b981; transition: width 0.1s; }

    /* Top Center: Checkpoint */
    .top-center-hud {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      text-align: center;
      background: rgba(24, 24, 27, 0.95); color: #f4f4f5;
      padding: 8px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }
    .cp-label { font-size: 20px; font-weight: 600; letter-spacing: 1px; font-family: 'Inter', sans-serif; }
    .cp-subtext { font-size: 9px; font-weight: 600; letter-spacing: 1px; color: #a1a1aa; }

    /* Top Right: Time & Lives */
    .top-right-hud {
      position: absolute; top: 20px; right: 20px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .time-value { font-size: 22px; font-weight: 600; font-family: 'Inter', sans-serif; color: #f4f4f5; letter-spacing: -1px; }
    .lives-container { display: flex; gap: 4px; }
    .heart { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; }
    .heart.lost { background: transparent; border: 1px solid rgba(255,255,255,0.2); }

    /* Speedometer (Center Bottom) */
    .bottom-center-hud {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: flex-end; gap: 5px;
      padding: 10px 24px;
      background: rgba(24, 24, 27, 0.95); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px; backdrop-filter: blur(10px);
    }
    #speedo-value { font-size: 80px; font-weight: 600; line-height: 0.8; letter-spacing: -2px; font-family: 'Inter', sans-serif; color: #f4f4f5; }
    .speedo-unit { font-size: 16px; font-weight: 600; color: #a1a1aa; margin-bottom: 15px; }

    /* Control Buttons (Bottom Sides) */
    .controls-container {
      position: absolute; bottom: 30px; width: 100%;
      display: flex; justify-content: space-between; padding: 0 30px;
      pointer-events: none;
    }
    .ctrl-group { display: flex; gap: 15px; pointer-events: auto; }
    .btn-square {
      width: 65px; height: 65px;
      background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; cursor: pointer; border-radius: 16px;
      color: #f4f4f5; font-weight: 600; font-size: 16px;
    }
    .btn-square:active { background: #fff; color: #18181b; transform: scale(0.95); }

    .pedal {
      width: 60px; height: 100px; background: rgba(24, 24, 27, 0.8);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #f4f4f5;
      transition: all 0.1s; cursor: pointer;
    }
    .pedal.active, .pedal:active { background: #fff; color: #18181b; transform: scale(0.95); }
    .pedal-accel { height: 130px; border-width: 2px; }

    #steering-zone {
      width: 150px;
      height: 150px;
      position: relative;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 14px 24px rgba(0,0,0,0.45));
    }
    .steering-backplate {
      position: absolute;
      inset: 0;
      border-radius: 42px;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,255,255,0.12), transparent 34%),
        linear-gradient(180deg, rgba(39,39,42,0.9), rgba(9,9,11,0.94));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -18px 26px rgba(0,0,0,0.4);
    }
    #steering-wheel-icon {
      width: 118px;
      height: 118px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s ease-out;
      transform-origin: center;
      z-index: 2;
    }
    .steering-wheel-svg {
      width: 118px;
      height: 118px;
      overflow: visible;
    }
    .steering-hand {
      position: absolute;
      top: 48px;
      width: 34px;
      height: 24px;
      border-radius: 14px 14px 12px 12px;
      background: linear-gradient(180deg, #f1c7a3, #b87953);
      border: 1px solid rgba(0,0,0,0.22);
      box-shadow: inset 0 3px 3px rgba(255,255,255,0.22), 0 4px 8px rgba(0,0,0,0.35);
      z-index: 3;
    }
    .steering-hand::after {
      content: "";
      position: absolute;
      top: 5px;
      width: 9px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f6d3b4, #b87953);
      border: 1px solid rgba(0,0,0,0.12);
    }
    .steering-hand-left {
      left: 4px;
      transform: rotate(24deg);
    }
    .steering-hand-left::after { right: -5px; transform: rotate(-18deg); }
    .steering-hand-right {
      right: 4px;
      transform: rotate(-24deg);
    }
    .steering-hand-right::after { left: -5px; transform: rotate(18deg); }
    #joystick-knob {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffffff, #a1a1aa 54%, #18181b);
      border: 2px solid rgba(255,255,255,0.72);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 4px rgba(16,185,129,0.18), inset 0 -4px 8px rgba(0,0,0,0.35);
      z-index: 4;
      pointer-events: none;
    }
    .steering-caption {
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      color: rgba(244,244,245,0.58);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.4px;
      white-space: nowrap;
    }

    /* NOTIFICATIONS */
    .checkpoint-notify {
        position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
        background: rgba(24,24,27,0.95); color: #f4f4f5; padding: 16px 32px;
        font-weight: 600; font-size: 1.2rem; letter-spacing: 1px;
        border: 1px solid rgba(255,255,255,0.2); border-radius: 9999px; z-index: 150;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        animation: slide-in 0.3s forwards, fade-out 0.3s 1.7s forwards;
    }
    @keyframes slide-in { from { top: -100px; } to { top: 100px; } }
    @keyframes fade-out { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    }

    /* OVERLAYS */
    #start-overlay, #game-over-overlay {
        position: fixed; inset: 0; background: #000; z-index: 200;
        display: flex; align-items: center; justify-content: center;
    }
    #game-over-overlay { background: rgba(255,0,0,0.15); backdrop-filter: blur(10px); }
    
    #start-btn:hover {
        background: #27272a !important;
        color: #f4f4f5 !important;
        box-shadow: 0 0 30px rgba(39,39,42,0.5);
    }

    @media (max-width: 768px) {
      .brutalist-panel { border-radius: 18px; padding: 10px 12px; }
      .top-left-hud { top: max(10px, env(safe-area-inset-top)); left: 10px; min-width: 150px; max-width: 44vw; }
      .top-right-hud { top: max(10px, env(safe-area-inset-top)); right: 10px; max-width: 38vw; gap: 6px; }
      .top-center-hud { top: max(86px, calc(env(safe-area-inset-top) + 76px)); padding: 6px 14px; border-radius: 18px; max-width: calc(100vw - 24px); }
      .score-label { font-size: 7px; letter-spacing: 1.2px; }
      .score-value { font-size: 20px; letter-spacing: -0.5px; }
      .time-value { font-size: 17px; }
      .cp-label { font-size: 13px; white-space: nowrap; }
      .cp-subtext { font-size: 7px; letter-spacing: 0.8px; }
      .bottom-center-hud { bottom: calc(env(safe-area-inset-bottom) + 150px); padding: 7px 14px; border-radius: 18px; }
      #speedo-value { font-size: 46px; letter-spacing: -1px; }
      .speedo-unit { font-size: 11px; margin-bottom: 7px; }
      .controls-container { bottom: max(12px, env(safe-area-inset-bottom)); padding: 0 12px; align-items: flex-end; }
      #steering-zone { width: 112px !important; height: 112px !important; }
      .steering-backplate { border-radius: 30px; }
      #steering-wheel-icon, .steering-wheel-svg { width: 88px !important; height: 88px !important; }
      #joystick-knob { width: 28px !important; height: 28px !important; }
      .steering-hand { top: 35px; width: 26px; height: 19px; }
      .steering-hand::after { width: 7px; height: 14px; }
      .steering-caption { display: none; }
      .ctrl-group { gap: 8px !important; }
      .btn-square { width: 52px !important; height: 52px !important; border-radius: 14px; font-size: 9px !important; }
      .pedal { width: 52px; height: 78px; border-radius: 14px; font-size: 9px; }
      .pedal-accel { height: 96px; }
      #start-overlay .brutalist-panel, #game-over-overlay .brutalist-panel { width: calc(100vw - 32px); padding: 2rem 1.25rem !important; }
      #start-overlay h1 { font-size: 2.2rem !important; }
      .checkpoint-notify { top: 128px; width: calc(100vw - 28px); padding: 12px 16px; font-size: 0.82rem; text-align: center; }
      @keyframes slide-in { from { top: -100px; } to { top: 128px; } }
    }

    @media (max-height: 520px) and (orientation: landscape) {
      .top-left-hud, .top-right-hud { top: 8px; transform: scale(0.86); transform-origin: top left; }
      .top-right-hud { transform-origin: top right; }
      .top-center-hud { top: 8px; transform: translateX(-50%) scale(0.82); }
      .bottom-center-hud { bottom: calc(env(safe-area-inset-bottom) + 82px); transform: translateX(-50%) scale(0.82); }
      .controls-container { bottom: max(8px, env(safe-area-inset-bottom)); padding: 0 18px; }
      #steering-zone { width: 94px !important; height: 94px !important; }
      .steering-backplate { border-radius: 26px; }
      #steering-wheel-icon, .steering-wheel-svg { width: 74px !important; height: 74px !important; }
      #joystick-knob { width: 24px !important; height: 24px !important; }
      .steering-hand { top: 30px; width: 22px; height: 16px; }
      .steering-hand::after { width: 6px; height: 12px; }
      .pedal { height: 62px; }
      .pedal-accel { height: 76px; }
      .btn-square { width: 46px !important; height: 46px !important; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index.js?v=level-themes-1"></script>
</head>
<body>
  <div id="root"></div>
  <div id="hud-overlay">
    <!-- Top Left -->
    <div class="top-left-hud brutalist-panel">
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
          <div>
              <div class="score-label">DATA MASTERY</div>
              <div class="score-value" id="stat-score">000,000</div>
          </div>
          <div style="text-align: right;">
              <div class="score-label">LEVEL</div>
              <div class="score-value" id="stat-level" style="color: #6C63FF;">1</div>
          </div>
      </div>
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <!-- Top Center -->
    <div class="top-center-hud">
      <div class="cp-label">UNIT: <span id="stat-unit-current">0</span> / <span id="stat-unit-total">10</span></div>
      <div class="cp-subtext">LEVEL MISSION PROGRESS</div>
    </div>

    <!-- Top Right -->
    <div class="top-right-hud brutalist-panel">
      <div class="time-value" id="stat-time">00:00:00</div>
      <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
          <div class="score-label" style="margin: 0; font-size: 7px;">AWARDS</div>
          <div id="mastery-badges" style="display: flex; gap: 4px;">
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
            <div class="heart" style="width: 8px; height: 8px; opacity: 0.2;"></div>
          </div>
      </div>
      <div style="display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-top: 5px;">
        <div id="shield-indicator" style="display: flex; align-items: center; gap: 5px; opacity: 0.3; transition: opacity 0.3s;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          <span style="font-size: 10px; font-weight: 600; color: #eab308; letter-spacing: 1px;">SHIELD</span>
        </div>
        <div class="lives-container">
          <div class="heart"></div>
          <div class="heart"></div>
          <div class="heart"></div>
        </div>
      </div>
    </div>

    <!-- Center Bottom Speedo -->
    <div class="bottom-center-hud">
      <div id="speedo-value">0</div>
      <div class="speedo-unit" id="stat-gear">N</div>
    </div>

    <!-- Bottom Controls -->
    <div class="controls-container">
      <div id="steering-zone" aria-label="Steering wheel">
        <div class="steering-backplate"></div>
        <div id="steering-wheel-icon">
          <svg class="steering-wheel-svg" viewBox="0 0 120 120" aria-hidden="true">
            <defs>
              <linearGradient id="wheelRim" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#f4f4f5" stop-opacity="0.95" />
                <stop offset="0.45" stop-color="#71717a" stop-opacity="0.8" />
                <stop offset="1" stop-color="#09090b" stop-opacity="0.95" />
              </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="48" fill="none" stroke="url(#wheelRim)" stroke-width="10" />
            <circle cx="60" cy="60" r="22" fill="rgba(24,24,27,0.92)" stroke="rgba(255,255,255,0.28)" stroke-width="3" />
            <path d="M39 62H16" stroke="rgba(244,244,245,0.72)" stroke-width="8" stroke-linecap="round" />
            <path d="M81 62h23" stroke="rgba(244,244,245,0.72)" stroke-width="8" stroke-linecap="round" />
            <path d="M60 80v24" stroke="rgba(244,244,245,0.72)" stroke-width="8" stroke-linecap="round" />
            <path d="M45 44c8-7 22-7 30 0" stroke="rgba(16,185,129,0.7)" stroke-width="4" stroke-linecap="round" />
          </svg>
          <div class="steering-hand steering-hand-left"></div>
          <div class="steering-hand steering-hand-right"></div>
          <div id="joystick-knob"></div>
        </div>
        <div class="steering-caption">TILT / DRAG</div>
      </div>

      <div class="ctrl-group" style="align-items: flex-end; gap: 10px;">
        <div id="nitro-btn" class="btn-square" style="border-color: #6C63FF; font-size: 10px; height: 60px; width: 60px;">BOOST</div>
        <div id="pedal-brake" class="pedal">BRAKE</div>
        <div id="pedal-accel" class="pedal pedal-accel">DRIVE</div>
      </div>
    </div>
  </div>

  <!-- START / LOADING OVERLAY -->
  <div id="start-overlay">
      <div class="brutalist-panel" style="padding: 3rem; text-align: center; max-width: 500px; border-width: 1px;">
          <h1 style="margin: 0; font-size: 3rem; letter-spacing: -1px; color: #f4f4f5; font-weight: 600;">PrepDrive</h1>
          <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 1.5rem 0;"></div>
          <p id="loading-status" style="margin: 1rem 0; font-size: 0.8rem; color: #a1a1aa; letter-spacing: 2px; font-weight: 500; text-transform: uppercase;">Initializing...</p>
          <button id="start-btn" style="display: none; width: 100%; border: none; background: #fff; color: #18181b; padding: 1.2rem; border-radius: 9999px; cursor: pointer; font-family: inherit; font-weight: 600; letter-spacing: 1px; transition: all 0.2s; margin-top: 1rem;">Start Game</button>
      </div>
  </div>

  <!-- CRASH OVERLAY -->
  <div id="crash-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center;">
      <div class="brutalist-panel" style="padding: 3rem; text-align: center; border-radius: 24px; border: 1px solid rgba(239, 68, 68, 0.3); background: rgba(24,24,27,0.95); box-shadow: 0 4px 30px rgba(239, 68, 68, 0.2); width: 90%; max-width: 450px;">
          <div style="width: 60px; height: 60px; background: rgba(239,68,68,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
              <span style="color: #ef4444; font-size: 2rem; line-height: 1;">&#9888;</span>
          </div>
          <h1 style="color: #f4f4f5; font-size: 2rem; font-weight: 600; letter-spacing: -1px; margin: 0;">You Crashed!</h1>
          <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 1.5rem 0;"></div>
          <p style="color: #a1a1aa; font-weight: 500; font-size: 0.8rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;">Restarting...</p>
      </div>
  </div>

</body>
</html>
